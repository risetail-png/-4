name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: リポジトリを取得
      uses: actions/checkout@v4

    - name: Python 3.11 をセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Tesseract OCR（日本語付き）をインストール
      run: |
        choco install tesseract --params="/Japanese" -y
        echo "C:\Program Files\Tesseract-OCR" | Out-File -Append -FilePath $env:GITHUB_PATH

    - name: Poppler をダウンロードして配置
      run: |
        $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip"
        $zip = "poppler.zip"
        $dest = "C:\poppler"
        Invoke-WebRequest -Uri $url -OutFile $zip
        Expand-Archive -Path $zip -DestinationPath $dest -Force
        $bin = Get-ChildItem $dest -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
        echo $bin | Out-File -Append -FilePath $env:GITHUB_PATH
        echo "Poppler bin: $bin"

    - name: Poppler と Tesseract の動作確認
      run: |
        pdftoppm -v
        tesseract --list-langs

    - name: Pythonライブラリをインストール
      run: |
        pip install --upgrade pip
        pip install pikepdf pypdf pdf2image pillow pytesseract pyinstaller tkinterdnd2

    - name: Poppler バイナリを同梱してEXEをビルド
      run: |
        $bin = Get-ChildItem C:\poppler -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
        pyinstaller `
          --onefile `
          --windowed `
          --name "橋梁点検PDFリンク追加ツール" `
          --hidden-import "PIL._tkinter_finder" `
          --collect-all "tkinterdnd2" `
          --add-binary "${bin}\pdftoppm.exe;poppler" `
          --add-binary "${bin}\pdftinfo.exe;poppler" `
          --add-binary "${bin}\pdfinfo.exe;poppler" `
          bridge_pdf_link_app.py

    - name: ビルド成果物をアップロード
      uses: actions/upload-artifact@v4
      with:
        name: 橋梁点検PDFリンク追加ツール-Windows
        path: dist/橋梁点検PDFリンク追加ツール.exe
        retention-days: 30

  build-mac:
    runs-on: macos-latest

    steps:
    - name: リポジトリを取得
      uses: actions/checkout@v4

    - name: Python 3.11 をセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Tesseract と Poppler をインストール
      run: |
        brew install tesseract tesseract-lang poppler

    - name: 動作確認
      run: |
        pdftoppm -v
        tesseract --list-langs

    - name: Pythonライブラリをインストール
      run: |
        pip install --upgrade pip
        pip install pikepdf pypdf pdf2image pillow pytesseract pyinstaller tkinterdnd2

    - name: Poppler バイナリを同梱してアプリをビルド
      run: |
        POPPLER_BIN=$(dirname $(which pdftoppm))
        pyinstaller \
          --onefile \
          --windowed \
          --name "橋梁点検PDFリンク追加ツール" \
          --hidden-import "PIL._tkinter_finder" \
          --collect-all "tkinterdnd2" \
          --add-binary "${POPPLER_BIN}/pdftoppm:poppler" \
          --add-binary "${POPPLER_BIN}/pdftinfo:poppler" \
          --add-binary "${POPPLER_BIN}/pdfinfo:poppler" \
          bridge_pdf_link_app.py

    - name: ビルド成果物をアップロード
      uses: actions/upload-artifact@v4
      with:
        name: 橋梁点検PDFリンク追加ツール-Mac
        path: dist/橋梁点検PDFリンク追加ツール
        retention-days: 30
