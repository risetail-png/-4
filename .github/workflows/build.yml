name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: リポジトリを取得
      uses: actions/checkout@v4

    - name: Python 3.11 をセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Tesseract OCR（日本語付き）をインストール
      run: |
        choco install tesseract --params="/Japanese" -y
        echo "C:\Program Files\Tesseract-OCR" | Out-File -Append -FilePath $env:GITHUB_PATH

    - name: Poppler をダウンロードして配置
      run: |
        $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip"
        Invoke-WebRequest -Uri $url -OutFile poppler.zip
        Expand-Archive -Path poppler.zip -DestinationPath C:\poppler -Force
        $bin = Get-ChildItem C:\poppler -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
        echo $bin | Out-File -Append -FilePath $env:GITHUB_PATH
        echo "POPPLER_BIN=$bin" | Out-File -Append -FilePath $env:GITHUB_ENV

    - name: 動作確認
      run: |
        pdftoppm -v
        tesseract --list-langs
        Write-Host "Poppler bin: $env:POPPLER_BIN"
        Get-ChildItem $env:POPPLER_BIN | Select-Object Name

    - name: Pythonライブラリをインストール
      run: |
        pip install --upgrade pip
        pip install pikepdf pypdf pdf2image pillow pytesseract pyinstaller tkinterdnd2

    - name: EXEをビルド（Popplerの存在するexeのみ同梱）
      run: |
        # 実際に存在するexeだけを収集
        $binaries = @("pdftoppm.exe","pdftoppm.exe","pdfinfo.exe","pdftopdf.exe") | ForEach-Object {
          $p = Join-Path $env:POPPLER_BIN $_
          if (Test-Path $p) { "--add-binary `"${p};poppler`"" }
        }
        $args = @(
          "--onefile",
          "--windowed",
          "--name", "橋梁点検PDFリンク追加ツール",
          "--hidden-import", "PIL._tkinter_finder",
          "--collect-all", "tkinterdnd2"
        ) + $binaries + @("bridge_pdf_link_app.py")

        Write-Host "pyinstaller args: $args"
        & pyinstaller @args

    - name: ビルド成果物をアップロード
      uses: actions/upload-artifact@v4
      with:
        name: 橋梁点検PDFリンク追加ツール-Windows
        path: dist/橋梁点検PDFリンク追加ツール.exe
        retention-days: 30

  build-mac:
    runs-on: macos-latest

    steps:
    - name: リポジトリを取得
      uses: actions/checkout@v4

    - name: Python 3.11 をセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Tesseract と Poppler をインストール
      run: |
        brew install tesseract tesseract-lang poppler

    - name: 動作確認
      run: |
        pdftoppm -v
        tesseract --list-langs

    - name: Pythonライブラリをインストール
      run: |
        pip install --upgrade pip
        pip install pikepdf pypdf pdf2image pillow pytesseract pyinstaller tkinterdnd2

    - name: アプリをビルド（Popplerの存在するバイナリのみ同梱）
      run: |
        POPPLER_BIN=$(dirname $(which pdftoppm))
        BINARIES=""
        for exe in pdftoppm pdfinfo pdftopdf; do
          if [ -f "${POPPLER_BIN}/${exe}" ]; then
            BINARIES="$BINARIES --add-binary ${POPPLER_BIN}/${exe}:poppler"
          fi
        done
        pyinstaller \
          --onefile \
          --windowed \
          --name "橋梁点検PDFリンク追加ツール" \
          --hidden-import "PIL._tkinter_finder" \
          --collect-all "tkinterdnd2" \
          $BINARIES \
          bridge_pdf_link_app.py

    - name: ビルド成果物をアップロード
      uses: actions/upload-artifact@v4
      with:
        name: 橋梁点検PDFリンク追加ツール-Mac
        path: dist/橋梁点検PDFリンク追加ツール
        retention-days: 30
